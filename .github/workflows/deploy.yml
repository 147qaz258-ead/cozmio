name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
    paths-ignore:
      - ".github/workflows/update-progress.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          npm install --force --no-audit --no-fund
          npm install framer-motion@12.38.0 gray-matter@4.0.3 remark@15.0.1 remark-gfm@4.0.1 remark-html@16.0.1 --force --no-audit --no-fund

      - name: Deploy
        run: node scripts/deploy-pages.mjs --skip-lint
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
