name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
    paths-ignore:
      - ".github/workflows/update-progress.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Debug modules
        run: |
          pwd
          ls node_modules/ | head -10
          ls -la node_modules/framer-motion/ 2>/dev/null || echo "framer-motion DIR MISSING"
          ls node_modules/gray-matter/ 2>/dev/null || echo "gray-matter DIR MISSING"
          echo "--- npm version ---"
          npm --version
          node --version

      - name: Deploy
        run: node scripts/deploy-pages.mjs --skip-lint
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
