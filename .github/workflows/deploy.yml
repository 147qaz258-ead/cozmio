name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
    paths-ignore:
      - ".github/workflows/update-progress.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Debug modules
        run: |
          ls node_modules/framer-motion/dist/es/index.mjs 2>/dev/null && echo "framer-motion ESM: OK" || echo "framer-motion ESM: MISSING"
          ls node_modules/gray-matter/ 2>/dev/null | head -3
          echo "---"
          node -e "const p=require('./node_modules/framer-motion/package.json'); console.log('fm exports keys:', Object.keys(p.exports||{}))"

      - name: Deploy
        run: node scripts/deploy-pages.mjs --skip-lint
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
