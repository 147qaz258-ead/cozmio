name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
    paths-ignore:
      - "public/data/**"
      - ".github/workflows/update-progress.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd web && npm install --prefer-offline --no-audit --no-fund || true

      - name: Deploy
        run: cd web && node scripts/deploy-pages.mjs --skip-lint
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
