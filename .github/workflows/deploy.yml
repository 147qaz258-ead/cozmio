name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
    paths-ignore:
      - ".github/workflows/update-progress.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Deploy
        run: |
          export NEXT_PUBLIC_SITE_URL=https://cozmio.net
          node node_modules/next/dist/bin/next build --no-turbopack
          node scripts/deploy-pages.mjs --skip-build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        shell: bash
