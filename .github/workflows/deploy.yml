name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
    paths-ignore:
      - ".github/workflows/update-progress.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-package-lock --prefer-offline=false --no-audit --no-fund

      - name: Verify modules
        run: |
          echo "=== Total dirs in node_modules ==="
          ls node_modules/ | wc -l
          echo "=== Check framer-motion ==="
          ls node_modules/ | grep -i "framer" || echo "framer NOT FOUND"
          echo "=== Check gray-matter ==="
          ls node_modules/ | grep -i "gray" || echo "gray NOT FOUND"
          echo "=== npm ls framer-motion ==="
          npm ls framer-motion 2>&1 | head -5

      - name: Deploy
        run: node scripts/deploy-pages.mjs --skip-lint
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
