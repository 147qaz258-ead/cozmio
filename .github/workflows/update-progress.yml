name: Update Progress Data

on:
  schedule:
    - cron: "0 3 * * *"  # UTC 03:00 = 北京时间 11:00
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全历史获取

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate progress data
        run: node scripts/generate-progress-data.mjs

      - name: Check for changes
        id: changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/progress.json
          if git diff --cached --exit-code; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes, skipping commit."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changed.outputs.changed == 'true'
        run: |
          git commit -m "chore: update progress data [skip ci]"
          git push
